name: Pipeline

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: BUILD, FORMAT & TEST (Run only on Push/PR/Dispatch)
  # ─────────────────────────────────────────────
  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Auto-format code
        run: cargo fmt --all

      - name: Commit and push formatting
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          export GIT_MERGE_AUTOEDIT=no
          export GIT_TERMINAL_PROMPT=0

          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Auto-fix formatting (cargo fmt)"
            git pull --rebase --no-edit origin "$BRANCH_NAME"
            git push origin "HEAD:refs/heads/$BRANCH_NAME"
          else
            echo "No formatting changes to commit."
          fi

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Run doc tests
        run: cargo test --doc

      # --- fast check docker with GHA-cache ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: link_monitor:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container startup and dependency compatibility
        run: |
          # run container for 10 seconds, if it runs normally and bash returns code 124 use --init.
          # timeout 10 docker run --init --rm link_monitor:ci-test || [ $? -eq 124 ]

          # send SIGINT (same Ctrl+C) to container after 10 seconds, and check if it exits gracefully.
          timeout -s SIGINT 10 docker run --rm link_monitor:ci-test || [ $? -eq 124 ]
